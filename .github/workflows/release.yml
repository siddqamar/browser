name: Release

# Pushing a version tag (e.g. v0.1.0 — release-plz creates these) builds, signs, notarizes, and
# publishes the app.
#
# CURRENTLY macOS ONLY. The engine is cross-platform, but only the macOS app *shell* (Swift/AppKit)
# exists today. Linux (GTK4) and Windows (Win32) shells are planned; when they land, add `linux`
# and `windows` jobs here (build the shell → package as .AppImage/.deb and a signed .msi/.exe →
# attach to the same release). The CI workflow already builds+tests the engine on all three OSes.
#
# Requires these repo secrets:
#   DEVELOPER_ID_P12_BASE64   base64 of the exported Developer ID Application .p12
#   DEVELOPER_ID_P12_PASSWORD password set when exporting the .p12
#   NOTARY_APPLE_ID           luna@lucidsoft.works
#   NOTARY_TEAM_ID            3TH63SHTY2
#   NOTARY_PASSWORD           an app-specific password (appleid.apple.com)
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub release + upload assets

jobs:
  # Gate: only attempt a signed release if the signing + notarization secrets are configured.
  # Otherwise the build job is skipped (not failed), so tagging before secrets are set is harmless.
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          CERT: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          NOTARY: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          if [ -n "$CERT" ] && [ -n "$NOTARY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Release secrets not configured — skipping the signed macOS build. Add DEVELOPER_ID_P12_BASE64, DEVELOPER_ID_P12_PASSWORD, and NOTARY_* to enable."
          fi

  macos:
    needs: check-secrets
    if: needs.check-secrets.outputs.ready == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Import Developer ID certificate into a temporary keychain
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

      - name: Build, sign, and notarize Browser.app
        env:
          SIGN_ID: "Developer ID Application: Lucid Softworks limited (3TH63SHTY2)"
          NOTARIZE: "1"
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: ./scripts/build.sh release-app

      - name: Zip the app
        run: ditto -c -k --keepParent dist/Browser.app "dist/Browser-${{ github.ref_name }}-macos.zip"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Browser-*-macos.zip
          generate_release_notes: true
