name: WPT

# Every PR runs the web-platform-tests conformance suite and posts a report comment — except PRs
# that can't affect engine conformance (docs, CI config, the macOS shell, packaging, build scripts).
# Anything under crates/ or the workspace manifests still triggers it.
#
# Pushes to main run the same suite to refresh the baseline the PR comment diffs against: each main
# run caches its per-area TSVs under `wpt-baseline-<sha>`, and PR runs restore the most recent one
# (caches created on the default branch are visible to PR runs) to compute the Δ-vs-main column.
on:
  pull_request:
    paths-ignore: &paths-ignore
      - '**.md'
      - '.github/**'
      - 'swift/**'
      - 'packaging/**'
      - 'scripts/**'
      - 'include/**'
      - 'LICENSE'
      - '.gitignore'
  push:
    branches: [main]
    paths-ignore: *paths-ignore

concurrency:
  group: wpt-${{ github.ref }}
  cancel-in-progress: true

# Read-only: a fork PR's GITHUB_TOKEN is read-only regardless, so this workflow never comments.
# The report is posted by wpt-comment.yml, which runs via workflow_run in the base repo's context
# with a write token. See that file for the rationale.
permissions:
  contents: read

jobs:
  # Build the run matrix from .github/wpt-areas.txt — the single source of truth for which areas the
  # suite covers — so the matrix, the PR-comment table, and the tracker-issue table can't drift. Each
  # line becomes a {dir, slug} pair; slug mirrors dir with `/` → `-` (artifact names can't contain
  # `/`). See that file for the per-area notes.
  areas:
    name: areas
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/wpt-areas.txt
          sparse-checkout-cone-mode: false
      - id: gen
        run: |
          matrix=$(grep -vE '^\s*(#|$)' .github/wpt-areas.txt | while read -r dir; do
            printf '{"dir":"%s","slug":"%s"}\n' "$dir" "${dir//\//-}"
          done | jq -s -c '{include: .}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  # Each WPT area runs on its own runner in parallel. html/dom dominates wall-clock; fanning the
  # areas out means the suite finishes in ~max(area) instead of ~sum(area). Each leg emits a
  # one-line TSV (dir, pass, total, pct) + its HTML report + a live-streamed .log; the `report`
  # job stitches them together.
  wpt:
    needs: areas
    name: wpt (${{ matrix.dir }})
    runs-on: ubuntu-latest
    # A buggy engine can drive a WPT test into an infinite loop inside a single tick() — the
    # runner's per-file 5s wall guard only fires between tick() calls, so an in-tick loop hangs
    # the leg forever (default 6h before GitHub kills it). Cap each leg instead.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.areas.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Shares the --release dependency cache seeded by CI's `test` job on main, so a fresh PR
      # doesn't recompile V8 + every dependency from cold. Only the workspace crates rebuild.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-deps
      - name: Install fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core fonts-liberation

      # Sparse, blobless checkout of just this leg's directory (+ shared resources + common). The
      # full repo is ~160k files. `common/` holds shared helpers (subset-tests*.js, get-host-info,
      # utils.js, …) that many tests load via `/common/...`; omit it and those tests 404 the helper
      # and fail spuriously (e.g. `subsetTestByKey is not defined`), masking real results.
      - name: Checkout web-platform-tests
        run: |
          git clone --filter=blob:none --sparse https://github.com/web-platform-tests/wpt.git "$RUNNER_TEMP/wpt"
          cd "$RUNNER_TEMP/wpt"
          git sparse-checkout set "${{ matrix.dir }}" resources common

      - name: Build runner
        run: cargo build --release -p wpt-runner

      - name: Run WPT
        run: |
          WPT="$RUNNER_TEMP/wpt"
          dir="${{ matrix.dir }}"
          slug="${{ matrix.slug }}"
          mkdir -p reports
          # `-q` silences cargo's own Finished/Running chatter; 2>&1 keeps the runner's per-file
          # PASS/FAIL/TIMEOUT lines. tee streams them into this leg's live log and saves a .log
          # (uploaded alongside the HTML report), then we read the summary line back out.
          log="reports/${slug}.log"
          WPT_REPORT="reports/${slug}.html" \
            cargo run --release -q -p wpt-runner -- "$WPT" "$dir" 200000 2>&1 | tee "$log"
          line=$(grep -E "^subtests:" "$log" | tail -1)
          p=$(echo "$line" | sed -E 's#subtests: ([0-9]+)/.*#\1#')
          t=$(echo "$line" | sed -E 's#subtests: [0-9]+/([0-9]+).*#\1#')
          pct=$(echo "$line" | sed -E 's#.*\(([0-9.]+%)\).*#\1#')
          printf '%s\t%s\t%s\t%s\n' "$dir" "$p" "$t" "$pct" > "reports/${slug}.tsv"

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: wpt-result-${{ matrix.slug }}
          path: reports/

  # Collect every leg's TSV + HTML + log, build the combined table, and post the single sticky
  # comment. Runs even if some legs fail (fail-fast is off) so partial results still surface.
  report:
    needs: [areas, wpt]
    if: always()
    runs-on: ubuntu-latest
    steps:
      # First, before anything writes to the workspace: checkout cleans it, so the artifact download
      # and baseline restore below must come after. We only need the canonical area list.
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/wpt-areas.txt
          sparse-checkout-cone-mode: false
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: wpt-result-*
          merge-multiple: true

      # Restore the latest main baseline (per-area TSVs). On a PR the exact key never matches, so the
      # `wpt-baseline-` prefix falls through to the newest cache — which only main writes. Absent on
      # the very first run before main has ever cached; the report degrades to "—" deltas then.
      - name: Restore main baseline
        uses: actions/cache/restore@v4
        with:
          path: baseline
          key: wpt-baseline-${{ github.sha }}
          restore-keys: |
            wpt-baseline-

      - name: Build report
        run: |
          rows=""; tp=0; tt=0; tdelta=0; have_base=0
          # Render the signed change in passing subtests vs the baseline; ±0 for no change, — if the
          # area has no baseline yet.
          fmt() { if [ "$1" -gt 0 ]; then echo "+$1"; elif [ "$1" -lt 0 ]; then echo "$1"; else echo "±0"; fi; }
          # Canonical display order from the shared area list, independent of which legs finished.
          for dir in $(grep -vE '^\s*(#|$)' .github/wpt-areas.txt); do
            slug="${dir//\//-}"
            f="artifacts/${slug}.tsv"
            [ -f "$f" ] || continue
            IFS=$'\t' read -r d p t pct < "$f"
            delta="—"
            bf="baseline/${slug}.tsv"
            if [ -f "$bf" ]; then
              have_base=1
              IFS=$'\t' read -r bd bp bt bpct < "$bf"
              dp=$((p - bp))
              delta=$(fmt "$dp")
              tdelta=$((tdelta + dp))
            fi
            rows="${rows}| \`${d}\` | ${p} / ${t} | ${pct} | ${delta} |\n"
            tp=$((tp + p)); tt=$((tt + t))
          done
          total_pct=$(awk "BEGIN{printf \"%.1f%%\", ${tt}?100*${tp}/${tt}:0}")
          # Total Δ sums only areas that had a baseline, so it stays honest if a new area lacks one.
          total_delta="—"; [ "$have_base" -eq 1 ] && total_delta=$(fmt "$tdelta")
          # Write the full comment body to a file. wpt-comment.yml posts this verbatim — keeping all
          # report formatting here means that workflow stays a dumb "download + post" step.
          mkdir -p comment
          {
            echo "## 🧪 WPT conformance"
            echo
            echo "| Area | Subtests | Pass rate | Δ vs \`main\` |"
            echo "|------|----------|-----------|------------|"
            printf "%b" "$rows"
            echo "| **Total** | **${tp} / ${tt}** | **${total_pct}** | **${total_delta}** |"
            echo
            echo "<sub>Δ vs \`main\` is the change in passing subtests against the latest \`main\` baseline (\`—\` when no baseline exists yet). web-platform-tests via \`crates/wpt-runner\`. Full HTML reports are attached as the \`wpt-reports\` artifact on this run.</sub>"
          } > comment/report.md

      - name: Upload HTML reports
        uses: actions/upload-artifact@v4
        with:
          name: wpt-reports
          path: |
            artifacts/*.html
            artifacts/*.log

      # On main, publish this run's per-area TSVs as the new baseline. The key is per-commit so the
      # save always succeeds (cache keys are immutable); PR runs pick it up via the restore-keys
      # prefix above. Old baselines age out under GitHub's cache eviction.
      - name: Save main baseline
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rm -rf baseline && mkdir -p baseline
          cp artifacts/*.tsv baseline/ 2>/dev/null || true
      - name: Cache main baseline
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: baseline
          key: wpt-baseline-${{ github.sha }}

      # Hand the comment off to wpt-comment.yml. We can't post here: a fork PR's GITHUB_TOKEN is
      # read-only. Stash the rendered body + the PR number so the workflow_run handler — which does
      # have a write token — can post it. Only PR runs need this; pushes to main have nothing to
      # comment on.
      - name: Stage PR comment
        if: github.event_name == 'pull_request'
        run: echo "${{ github.event.pull_request.number }}" > comment/pr-number.txt
      - name: Upload PR comment
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: wpt-comment
          path: comment/
