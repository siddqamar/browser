name: CI

on:
  pull_request:
  push:
    branches: [main]

# A new push to a PR cancels the previous run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # NOTE: the Conventional-Commit PR-title check lives in its own workflow (pr-title.yml) so it
  # re-runs when the title is EDITED — which this workflow's default pull_request trigger
  # (opened/synchronize/reopened) does not cover — without re-running the build/test matrix on
  # every title or description edit.

  # Fast lint pass (one OS): formatting + clippy. Fails the PR on warnings.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # The whole point of cross-platform dev: the Rust engine + all unit tests build and pass on
  # macOS, Linux, and Windows. (The Swift/AppKit shell is macOS-only and built separately.)
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Caches ~/.cargo and target/, including the prebuilt V8 static lib — without this every
      # run re-downloads/links ~hundreds of MB of V8. The shared-key lets the WPT workflow restore
      # the same --release dependency cache (its Linux leg builds the identical dep set).
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-deps
      # Engine font tests need a system TTF; Linux runners ship none by default.
      - name: Install fonts (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core fonts-liberation
      # The `ffi` crate is a cdylib that statically embeds V8; on Linux the V8 static lib's
      # thread-locals can't be linked into a shared object (R_X86_64_TPOFF32 against -shared). It's
      # the macOS-shell-only C ABI anyway (Linux/Windows shells will link the engine crate directly),
      # so build/test it only on macOS and exclude it elsewhere.
      - name: Build + test
        shell: bash
        run: |
          EXCLUDE=""
          [ "$RUNNER_OS" != "macOS" ] && EXCLUDE="--exclude ffi"
          cargo build --workspace --release $EXCLUDE
          cargo test --workspace --release $EXCLUDE
